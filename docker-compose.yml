version: '3.8'

services:
  mcp-server:
    build: .
    container_name: sql-mcp-server
    ports:
      - "5222:5222"
    environment:
      # Use an environment variable to place the SQLite DB inside a persistent volume
      - SQLITE_DB_PATH=/app/data/local.db
      # For secure prod testing, the secret is explicitly defined here
      # - NORTH_AUTH_SECRET=my-super-secret-token-1234
    volumes:
      - mcp-data:/app/data
    restart: unless-stopped

volumes:
  mcp-data:
